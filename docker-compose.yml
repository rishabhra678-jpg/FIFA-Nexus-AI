version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fifa-nexus-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: always

  frontend:
    build: ./frontend
    container_name: fifa-nexus-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
